<!DOCTYPE html>
<html>
<head>
    <title>Anemia Detection</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        form { margin-top: 20px; }
        input, button { margin: 10px; padding: 10px; }
        .result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Anemia Detection System</h2>
    <form action="/predict" method="post" enctype="multipart/form-data">
        <label>Upload Image:</label>
        <input type="file" name="image" required><br>

        <label>Enter Tabular Data (CSV Format: Hemoglobin, MCH, MCHC, MCV):</label>
        <input type="text" name="tabular_data" placeholder="14.9,22.7,29.1,83.7" required><br>

        <button type="submit">Predict</button>
    </form>

    {% if cnn_pred is not none and ml_pred is not none %}
        <div class="result">
            <p><strong>CNN Prediction:</strong> {{ cnn_pred }}</p>
            <p><strong>ML Prediction:</strong> {{ ml_pred }}</p>
            <p><strong>Final Prediction:</strong> {{ final_pred }}</p>
        </div>
    {% endif %}

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
</body>
</html>
